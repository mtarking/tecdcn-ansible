networks:
  - net_name: CiscoLive_Net01
    vrf_name: CiscoLive_VRF01
    net_id: 30001
    vlan_id: 2301
    vlan_name: CiscoLive_Net01_vlan2301
    gw_ip_subnet: 192.168.1.1/24
    attach_group: leaf1_leaf2
    deploy: false
  - net_name: CiscoLive_Net02
    vrf_name: CiscoLive_VRF01
    net_id: 30002
    vlan_id: 2302
    vlan_name: CiscoLive_Net02_vlan2302
    gw_ip_subnet: 192.168.2.1/24
    attach_group: leaf3
    deploy: false
